---
# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: fluxcd
  # renovate: datasource=github-releases depName=fluxcd/flux2
  version: v2.9.2
  source: https://github.com/colonel-byte/zarf-pkg-fluxcd
  annotations:
    org.opencontainers.image.source: https://github.com/colonel-byte/zarf-pkg-fluxcd
    org.opencontainers.image.description: Zarf package for deploying fluxcd
components:
  - name: fluxcd-core
    required: true
    only:
      flavor: upstream
    manifests:
      - name: fluxcd
        namespace: flux-system
        kustomizations:
          - upstream/core
    images:
      - ghcr.io/fluxcd/helm-controller:v1.6.2
      - ghcr.io/fluxcd/kustomize-controller:v1.9.3
      - ghcr.io/fluxcd/notification-controller:v1.9.2
      - ghcr.io/fluxcd/source-controller:v1.9.3
  - name: fluxcd-image-controller
    required: false
    only:
      flavor: upstream
    manifests:
      - name: fluxcd
        namespace: flux-system
        kustomizations:
          - upstream/images
    images:
      - ghcr.io/fluxcd/image-automation-controller:v1.2.3
      - ghcr.io/fluxcd/image-reflector-controller:v1.2.3
  - name: fluxcd-source-watcher
    required: false
    only:
      flavor: upstream
    manifests:
      - name: fluxcd
        namespace: flux-system
        kustomizations:
          - upstream/source
    images:
      - ghcr.io/fluxcd/source-watcher:v2.2.2
  - name: fluxcd-core
    required: true
    only:
      flavor: minimus
    manifests:
      - name: fluxcd
        namespace: flux-system
        kustomizations:
          - minimus/core
    images:
      - reg.mini.dev/fluxcd-helm-controller:v1.6.2
      - reg.mini.dev/fluxcd-kustomize-controller:v1.9.2
      - reg.mini.dev/fluxcd-notification-controller:v1.9.2
      - reg.mini.dev/fluxcd-source-controller:v1.9.2
  - name: fluxcd-image-controller
    required: false
    only:
      flavor: minimus
    manifests:
      - name: fluxcd
        namespace: flux-system
        kustomizations:
          - minimus/images
    images:
      - reg.mini.dev/fluxcd-image-automation-controller:v1.2.2
      - reg.mini.dev/fluxcd-image-reflector-controller:v1.2.2
  - name: fluxcd-source-watcher
    required: false
    only:
      flavor: minimus
    manifests:
      - name: fluxcd
        namespace: flux-system
        kustomizations:
          - minimus/source
    images:
      - reg.mini.dev/fluxcd-source-watcher:v2.2.2
